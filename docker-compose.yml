services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: healthcare-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: healthcare
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d healthcare"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: healthcare-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  livekit:
    image: livekit/livekit-server:v1.5
    container_name: healthcare-livekit
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    command: --config /etc/livekit.yaml
    volumes:
      - ./infrastructure/dokploy/livekit.yaml:/etc/livekit.yaml

  prometheus:
    image: prom/prometheus:latest
    container_name: healthcare-prometheus
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: healthcare-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/api/Dockerfile
    container_name: healthcare-api
    ports:
      - "8000:8000"
    env_file:
      - .env.api.example
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai-service:
    build:
      context: .
      dockerfile: infrastructure/docker/ai/Dockerfile
    container_name: healthcare-ai-service
    ports:
      - "8001:8001"
    env_file:
      - .env.ai.example
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/worker/Dockerfile
    container_name: healthcare-worker
    env_file:
      - .env.worker.example
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  grafana_data:
